<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8" />

  <title>fisikasi</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <div class="brand">
      <img src="./assets/logo.png" alt="fisikasi logo" class="brand-logo" />
      <div class="brand-text">
        <h1>Fisikasi</h1>
        <p>Zure zientzietako baliabide digitalen gunea</p>
      </div>
    </div>
  </header>

  <main class="container">
    <nav class="menu">
  <a class="menu-button" href="kanaleko-bideoak.html">
    <span class="menu-icon" aria-hidden="true">🎥</span>
    <span class="menu-text">Kanaleko Bideoak</span>
  </a>

  <a class="menu-button" href="irakasleentzako-baliabideak.html">
    <span class="menu-icon" aria-hidden="true">📚</span>

  <a class="menu-button" href="bestelako-baliabideak.html">

  </a>
</nav>
<button id="install-app-btn" class="install-button hidden" type="button">
  Aplikazioa deskargatu
</button>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("./service-worker.js");
          console.log("Service Worker registrado");
        } catch (error) {
          console.error("Error al registrar el Service Worker:", error);
        }
      });
    }
  </script>

  <script src="app.js"></script>
</body>
</html>
